name: tuya_flutter_sdk
description: Flutter plugin for the Tuya Smart Home SDK
version: 0.0.1
homepage: https://github.com/tuya/tuya-flutter-sdk

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  plugin:
    platforms:
      android:
        package: com.zerotech.tuya_flutter_sdk
        pluginClass: TuyaFlutterSdkPlugin 